<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 110" role="img" aria-label="LAATS Safety and Quality Services International Panamá">
  <!-- Background -->
  <rect width="320" height="110" fill="white" rx="4"/>

  <!-- Golden swoosh arc -->
  <path d="M 30 85 Q 100 20 280 10" stroke="#C49B0A" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- Airplane at end of swoosh -->
  <g transform="translate(268, 4) rotate(-18)">
    <!-- Fuselage -->
    <ellipse cx="14" cy="6" rx="14" ry="4" fill="#C49B0A"/>
    <!-- Wings -->
    <polygon points="10,6 20,6 26,14 22,14" fill="#C49B0A"/>
    <polygon points="10,6 20,6 14,-2 10,-2" fill="#C49B0A"/>
    <!-- Tail -->
    <polygon points="0,6 4,6 2,2" fill="#C49B0A"/>
  </g>

  <!-- LAATS letters -->
  <text
    x="22"
    y="72"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="62"
    letter-spacing="2"
    fill="#1B3A6B"
  >LAATS</text>

  <!-- Tagline: SAFETY AND QUALITY SERVICES -->
  <text
    x="160"
    y="86"
    font-family="Arial, sans-serif"
    font-weight="700"
    font-size="10.5"
    letter-spacing="1.5"
    text-anchor="middle"
    fill="#C49B0A"
  >SAFETY AND QUALITY SERVICES</text>

  <!-- Divider lines + INTERNATIONAL PANAMÁ -->
  <line x1="22" y1="97" x2="72" y2="97" stroke="#1B3A6B" stroke-width="1.5"/>
  <text
    x="160"
    y="101"
    font-family="Arial, sans-serif"
    font-weight="400"
    font-size="9"
    letter-spacing="2"
    text-anchor="middle"
    fill="#1B3A6B"
  >INTERNATIONAL · PANAMÁ</text>
  <line x1="248" y1="97" x2="298" y2="97" stroke="#1B3A6B" stroke-width="1.5"/>
</svg>
